substitutions:
  _REGION: us-central1
  _SERVICE_NAME: planwise-ai-backend
  _VERTEX_AI_MODEL: gemini-2.5-flash

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/planwise/${_SERVICE_NAME}:$SHORT_SHA
      - backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/planwise/${_SERVICE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/planwise/${_SERVICE_NAME}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - AI_PROVIDER=vertex,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION},VERTEX_AI_MODEL=${_VERTEX_AI_MODEL}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/planwise/${_SERVICE_NAME}:$SHORT_SHA

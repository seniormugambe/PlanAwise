services:
  - type: web
    name: planwise-api
    env: node
    plan: free
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: AI_PROVIDER
        value: auto
      - key: VERTEX_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: VITE_API_URL
        value: https://planwise-api.onrender.com
  - type: web
    name: planwise-web
    env: node
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm run preview
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://planwise-api.onrender.com
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false
      - key: VITE_ALCHEMY_API_KEY
        sync: false
      - key: VITE_INFURA_API_KEY
        sync: false
      - key: VITE_APP_ENV
        value: production
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
